{% extends "base.html" %}

{% block title %}API Data Processing{% endblock %}

{% block content %}
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        .dashboard-container {
            padding: 2rem;
        }

        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stats-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .files-table {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .badge-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #3730a3;
            transform: scale(1.05);
        }

        .progress-bar-custom {
            height: 8px;
            border-radius: 10px;
        }
    </style>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="row mb-4">
            <div class="page-header">
                <h1>
                    Dashboard de Nettoyage
                </h1>
            </div>
        </div>

        <!-- Statistiques globales -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card text-center">
                    <i class="fas fa-file-alt stat-icon text-primary"></i>
                    <h3 id="totalFiles">0</h3>
                    <p class="text-muted mb-0">Fichiers traités</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card text-center">
                    <i class="fas fa-database stat-icon text-success"></i>
                    <h3 id="totalRows">0</h3>
                    <p class="text-muted mb-0">Lignes traitées</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card text-center">
                    <i class="fas fa-check-circle stat-icon text-success"></i>
                    <h3 id="successRate">0%</h3>
                    <p class="text-muted mb-0">Taux de succès</p>
                </div>
            </div>
        </div>

        <!-- Tableau des fichiers -->
        <div class="files-table">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="fas fa-list"></i> Historique des fichiers</h3>
                <a href="/upload" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Nouveau fichier
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Fichier</th>
                            <th>Date</th>
                            <th>Lignes</th>
                            <th>Traitements</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="filesTableBody">
                        <!-- Rempli par JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Charger les données au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                // Récupérer les statistiques
                const statsResponse = await fetch('/api/dashboard/stats');
                const stats = await statsResponse.json();

                // Mettre à jour les statistiques
                if (stats.general) {
                    document.getElementById('totalFiles').textContent = stats.general.total_files || 0;
                    document.getElementById('totalRows').textContent = (stats.general.total_rows_final || 0).toLocaleString();
                    document.getElementById('successRate').textContent = (stats.general.avg_retention_rate || 0).toFixed(1) + '%';
                }

                // Récupérer la liste des fichiers
                const filesResponse = await fetch('/api/dashboard/files');
                const files = await filesResponse.json();

                // Remplir le tableau
                displayFiles(files);

            } catch (error) {
                console.error('Erreur chargement dashboard:', error);
            }
        }

        function displayFiles(files) {
            const tbody = document.getElementById('filesTableBody');
            tbody.innerHTML = '';

            files.forEach(file => {
                const row = document.createElement('tr');

                // Badge de statut
                let statusBadge = '';
                if (file.processing_status === 'success') {
                    statusBadge = '<span class="badge bg-success">Succès</span>';
                } else if (file.processing_status === 'error') {
                    statusBadge = '<span class="badge bg-danger">Erreur</span>';
                } else {
                    statusBadge = '<span class="badge bg-warning">En cours</span>';
                }

                // Calcul du changement de lignes
                const rowsChange = file.initial_rows - file.final_rows;
                const rowsChangeText = rowsChange > 0
                    ? `<span class="text-danger">-${rowsChange}</span>`
                    : `<span class="text-success">+${Math.abs(rowsChange)}</span>`;

                row.innerHTML = `
                    <td>
                        <i class="fas fa-file-${file.file_extension} text-primary"></i>
                        <strong>${file.original_filename}</strong>
                    </td>
                    <td>${new Date(file.upload_date).toLocaleString('fr-FR')}</td>
                    <td>
                        ${file.initial_rows.toLocaleString()} → ${file.final_rows.toLocaleString()}
                        ${rowsChangeText}
                    </td>
                    <td>
                        <span class="badge bg-info">${file.treatments_count} traitements</span>
                    </td>
                    <td>${statusBadge}</td>
                    <td>
                        <a href="/dashboard/${file.id}" class="btn btn-sm btn-view me-2">
                            <i class="fas fa-eye"></i> Voir
                        </a>
                        ${file.output_filename ? `
                            <a href="/download/${file.output_filename}" class="btn btn-sm btn-success">
                                <i class="fas fa-download"></i>
                            </a>
                        ` : ''}
                    </td>
                `;

                tbody.appendChild(row);
            });
        }
    </script>

{% endblock %}
