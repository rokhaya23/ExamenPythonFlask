<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — DataApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:       #4f46e5;
            --primary-light: #eef2ff;
            --primary-dark:  #3730a3;
            --success:       #10b981;
            --danger:        #ef4444;
            --text-main:     #111827;
            --text-muted:    #6b7280;
            --border:        #e5e7eb;
            --surface:       #ffffff;
            --bg:            #f9fafb;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Fond décoratif */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79,70,229,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        /* Logo / Brand */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 52px; height: 52px;
            background: var(--primary);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 0.875rem;
            box-shadow: 0 8px 24px rgba(79,70,229,0.3);
        }
        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }
        .brand-tagline {
            font-size: 0.825rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* Card */
        .auth-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .auth-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.3rem;
        }
        .auth-subtitle {
            font-size: 0.825rem;
            color: var(--text-muted);
            margin-bottom: 1.75rem;
        }

        /* Alerte erreur */
        .alert-error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.825rem;
            color: #991b1b;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .alert-success {
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.825rem;
            color: #065f46;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Champs */
        .field {
            margin-bottom: 1.1rem;
        }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }
        .field-wrap {
            position: relative;
        }
        .field-wrap i.field-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
        }
        .field input {
            width: 100%;
            padding: 0.7rem 0.875rem 0.7rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 0.875rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            background: var(--bg);
            transition: all 0.15s;
            outline: none;
        }
        .field input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .field input::placeholder { color: #9ca3af; }

        /* Toggle mot de passe */
        .toggle-pwd {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
            transition: color 0.15s;
        }
        .toggle-pwd:hover { color: var(--primary); }

        /* Lien mot de passe oublié */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.775rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: 0.4rem;
            font-weight: 500;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* Bouton submit */
        .btn-auth {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 0.925rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 12px rgba(79,70,229,0.25);
        }
        .btn-auth:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79,70,229,0.35);
        }
        .btn-auth:active { transform: translateY(0); }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.775rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Lien inscription */
        .auth-footer {
            text-align: center;
            font-size: 0.825rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-database"></i></div>
        <div class="brand-name">DataApp</div>
        <div class="brand-tagline">Nettoyage de données intelligent</div>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <div class="auth-title">Bon retour 👋</div>
        <div class="auth-subtitle">Connectez-vous à votre compte</div>

        <!-- Messages flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert-{{ 'error' if category == 'error' else 'success' }}">
                    <i class="fas fa-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/login">

            <div class="field">
                <label for="email">Adresse email</label>
                <div class="field-wrap">
                    <i class="fas fa-envelope field-icon"></i>
                    <input type="email" id="email" name="email"
                           placeholder="vous@exemple.com"
                           value="{{ request.form.get('email', '') }}"
                           required autocomplete="email">
                </div>
            </div>

            <div class="field">
                <label for="password">Mot de passe</label>
                <div class="field-wrap">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="password" name="password"
                           placeholder="Votre mot de passe"
                           required autocomplete="current-password">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>

        </form>

        <div class="divider">ou</div>

        <div class="auth-footer">
            Pas encore de compte ?
            <a href="/register">Créer un compte</a>
        </div>
    </div>

</div>

<script>
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>

</body>
</html>
