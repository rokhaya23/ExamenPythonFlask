<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Data Processing API{% endblock %}</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS local -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-bar-chart-fill"></i>
            <h4>DataApp</h4>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Menu Principal</div>
            <nav>
                <a class="nav-link" href="/">
                    <i class="bi bi-cart-fill"></i>
                    <span>Accueil</span>
                </a>
                <a class="nav-link" href="/upload">
                    <i class="bi bi-cloud-upload-fill"></i>
                    <span>Upload & Traitement</span>
                </a>
                <a class="nav-link" href="/dashboard">
                    <i class="bi bi-grid-fill"></i>
                    <span>Dashboard</span>
                </a>
            </nav>
        </div>

    </div>

    <!-- HEADER -->
    <header class="main-header">
        <div class="search-box position-relative">
            <i class="bi bi-search search-icon"></i>
            <input type="text" placeholder="Rechercher ou taper une commande..." class="form-control">
        </div>

        <div class="header-actions">
            <button class="icon-btn">
                <i class="bi bi-moon-fill"></i>
            </button>
            <button class="icon-btn position-relative">
                <i class="bi bi-bell-fill"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">
                    3
                </span>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
